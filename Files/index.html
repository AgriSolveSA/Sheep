<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheep Farm Profitability Model - South Africa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; }
        button { background: #2c7a4d; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1e5a38; }
        .results { margin-top: 20px; border-top: 2px solid #ccc; padding-top: 10px; }
        .warning { color: #c0392b; background: #f9e6e6; padding: 5px; margin: 5px 0; }
        .rec { color: #2c3e50; background: #e8f4f8; padding: 5px; margin: 5px 0; }
        pre { background: #eee; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>Sheep Farming Profitability Model<br><small>South Africa (2025-2026)</small></h1>
    
    <label>Land area (hectares)</label>
    <input type="number" id="landHa" value="120" step="1">
    
    <label>Flock size (number of ewes)</label>
    <input type="number" id="flockSize" value="180" step="1">
    
    <label>Breed</label>
    <select id="breed">
        <option value="Merino">Merino</option>
        <option value="Dorper">Dorper</option>
        <option value="DohneMerino">Dohne Merino</option>
        <option value="Other">Other</option>
    </select>
    
    <label>Production System</label>
    <select id="productionSystem">
        <option value="extensive">Extensive (Karoo/N Cape)</option>
        <option value="semiIntensive" selected>Semi-Intensive (Free State)</option>
        <option value="intensive">Intensive (Irrigated)</option>
    </select>
    
    <label>Market Channel</label>
    <select id="marketChannel">
        <option value="auction">Auction</option>
        <option value="abattoir">Abattoir</option>
        <option value="direct">Direct / Farm gate</option>
    </select>
    
    <label>Feed Source</label>
    <select id="feedSource">
        <option value="purchased">Purchased</option>
        <option value="homeGrown">Home-grown</option>
        <option value="mixed" selected>Mixed</option>
    </select>
    
    <label><input type="checkbox" id="studOperation"> Stud operation (breeding stock premium)</label>
    <label><input type="checkbox" id="agriTourism"> Agri-tourism (farm stays/tours)</label>
    
    <button onclick="runModel()">Calculate Profitability</button>
    
    <div id="results" class="results"></div>
</div>

<script src="sheepFarmModel.js"></script>
<script>
    function runModel() {
        const inputs = {
            landHa: parseFloat(document.getElementById('landHa').value),
            flockSize: parseInt(document.getElementById('flockSize').value),
            breed: document.getElementById('breed').value,
            productionSystem: document.getElementById('productionSystem').value,
            marketChannel: document.getElementById('marketChannel').value,
            feedSource: document.getElementById('feedSource').value,
            studOperation: document.getElementById('studOperation').checked,
            agriTourism: document.getElementById('agriTourism').checked
        };
        
        try {
            const model = new SheepFarmModel(inputs);
            const report = model.getReport();
            
            let html = `<h3>Profitability Summary</h3>`;
            html += `<pre>`;
            html += `Total Revenue:    R ${report.summary.totalRevenue.toFixed(0)}\n`;
            html += `Total Costs:      R ${report.summary.totalCosts.toFixed(0)}\n`;
            html += `Net Profit:       R ${report.summary.netProfit.toFixed(0)}\n`;
            html += `Profit Margin:    ${report.summary.profitMargin.toFixed(1)}%\n`;
            html += `Break-even Lambs: ${report.summary.breakEvenLambs}\n`;
            html += `Status:           ${report.summary.status}\n`;
            html += `</pre>`;
            
            if (model.warnings.length > 0) {
                html += `<h4>⚠️ Warnings</h4>`;
                model.warnings.forEach(w => {
                    html += `<div class="warning"><strong>[${w.severity}]</strong> ${w.message}</div>`;
                });
            }
            
            if (model.recommendations.length > 0) {
                html += `<h4>💡 Recommendations</h4>`;
                model.recommendations.forEach(rec => {
                    html += `<div class="rec"><strong>${rec.category}</strong><ul>`;
                    rec.items.forEach(item => html += `<li>${item}</li>`);
                    html += `</ul></div>`;
                });
            }
            
            document.getElementById('results').innerHTML = html;
        } catch (err) {
            document.getElementById('results').innerHTML = `<div class="warning">Error: ${err.message}</div>`;
        }
    }
</script>
</body>
</html>
