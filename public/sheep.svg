  <circle cx="34" cy="29" r="11" fill="#ddd8c4"/>
  <circle cx="43" cy="32" r="9"  fill="#ddd8c4"/>
  <circle cx="40" cy="40" r="8"  fill="#ddd8c4"/>
  <circle cx="28" cy="41" r="8"  fill="#ddd8c4"/>

