<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — ShepherdAI</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">

<div class="auth-box">
    <a href="/" class="auth-logo">Shepherd<span>AI</span></a>
    <h1>Welcome back</h1>
    <p class="text-muted mt-1">Log in to access your farm reports.</p>

    <div id="alert-box" class="mt-2"></div>

    <form id="login-form" class="mt-3" novalidate>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Log in</button>
    </form>

    <div class="divider">or</div>

    <p class="text-center text-muted" style="font-size:.9rem;">
        Don't have an account? <a href="/signup.html">Sign up free</a>
    </p>
    <p class="text-center text-muted mt-2" style="font-size:.85rem;">
        <a href="/">← Back to home</a>
    </p>
</div>

<script src="/app.js"></script>
<script>
'use strict';
Auth.redirectIfAuthed();

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert('alert-box');

    const btn      = document.getElementById('submit-btn');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        return showAlert('alert-box', 'Please enter your email and password.', 'error');
    }

    setLoading(btn, true);
    try {
        const res = await API.login(email, password);
        Auth.save(res.sessionId, res.userId);
        const next = new URLSearchParams(window.location.search).get('next') || '/dashboard.html';
        window.location.href = next;
    } catch (err) {
        showAlert('alert-box', err.message || 'Login failed. Please check your credentials.', 'error');
        setLoading(btn, false);
    }
});
</script>
</body>
</html>
