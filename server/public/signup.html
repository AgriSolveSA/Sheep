<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — ShepherdAI</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">

<div class="auth-box">
    <a href="/" class="auth-logo">Shepherd<span>AI</span></a>
    <h1>Create your account</h1>
    <p class="text-muted mt-1">Free to sign up. Run your first report for R199.</p>

    <div id="alert-box" class="mt-2"></div>

    <form id="signup-form" class="mt-3" novalidate>
        <div class="form-group">
            <label for="full_name">Full name <span class="text-muted" style="font-weight:400;">(optional)</span></label>
            <input type="text" id="full_name" name="full_name" placeholder="Jan van der Merwe" autocomplete="name">
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="mobile">Mobile number <span class="text-muted" style="font-weight:400;">(optional)</span></label>
            <input type="tel" id="mobile" name="mobile" placeholder="082 123 4567" autocomplete="tel">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password" minlength="8">
            <p class="form-hint">Minimum 8 characters</p>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Create account</button>

        <p class="text-muted mt-2" style="font-size:.82rem;text-align:center;">
            By signing up you agree to our terms. Your data is stored securely and never sold.
        </p>
    </form>

    <div class="divider">or</div>

    <p class="text-center text-muted" style="font-size:.9rem;">
        Already have an account? <a href="/login.html">Log in</a>
    </p>
    <p class="text-center text-muted mt-2" style="font-size:.85rem;">
        <a href="/">← Back to home</a>
    </p>
</div>

<script src="/app.js"></script>
<script>
'use strict';
Auth.redirectIfAuthed();

document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert('alert-box');

    const btn      = document.getElementById('submit-btn');
    const fullName = document.getElementById('full_name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const mobile   = document.getElementById('mobile').value.trim();
    const password = document.getElementById('password').value;

    if (!email) return showAlert('alert-box', 'Email address is required.', 'error');
    if (password.length < 8) return showAlert('alert-box', 'Password must be at least 8 characters.', 'error');

    setLoading(btn, true);
    try {
        await API.signup(email, password, fullName || null, mobile || null);
        // Auto-login after signup
        const res = await API.login(email, password);
        Auth.save(res.sessionId, res.userId);
        window.location.href = '/dashboard.html';
    } catch (err) {
        const msg = err.code === 'EMAIL_EXISTS'
            ? 'An account with this email already exists. <a href="/login.html">Log in instead</a>.'
            : (err.message || 'Signup failed. Please try again.');
        showAlert('alert-box', msg, 'error');
        setLoading(btn, false);
    }
});
</script>
</body>
</html>
